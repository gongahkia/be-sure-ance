repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: black --check src tests scripts
        language: system
        pass_filenames: false
      - id: ruff
        name: ruff
        entry: ruff check src tests scripts
        language: system
        pass_filenames: false
      - id: frontend-lint
        name: frontend lint
        entry: npm --prefix src/be-sure-ance-app run lint
        language: system
        pass_filenames: false
      - id: frontend-format
        name: frontend format
        entry: npm --prefix src/be-sure-ance-app run format:check
        language: system
        pass_filenames: false
