name: be-sure-ance-local

services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      uvicorn src.backend.pdf_brief_api:app --host 0.0.0.0 --port 8000"
    environment:
      BE_SURE_ANCE_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    volumes:
      - .:/app:ro

  frontend:
    image: node:20-alpine
    working_dir: /app/src/be-sure-ance-app
    command: >
      sh -c "npm ci &&
      printf '\n\n  Frontend URL: http://localhost:5173\n\n' &&
      npm run dev -- --host 0.0.0.0"
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_PDF_BRIEF_ENDPOINT: http://localhost:8000/briefs/client.pdf
      VITE_STATIC_DATA_PATH: /data/app-data.json
      VITE_LIVE_SCRAPE_MODE: "true"
      VITE_LIVE_TABLES_PATH: /data/tables
      VITE_SITE_ORIGIN: http://localhost:5173
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - frontend_node_modules:/app/src/be-sure-ance-app/node_modules

  scraper:
    image: python:3.12-slim
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      python -m playwright install --with-deps chromium &&
      BE_SURE_ANCE_DATA_DIR=src/be-sure-ance-app/public/data
      python -m src.lib.static_app_data --run-scrapers
      --output src/be-sure-ance-app/public/data/app-data.json"
    volumes:
      - .:/app

  bot:
    image: python:3.12-slim
    profiles:
      - bot
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      python -m src.bot.telegram_bot"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    volumes:
      - .:/app:ro

volumes:
  frontend_node_modules:
