name: be-sure-ance-local

services:
  supabase-local:
    image: python:3.12-slim
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir fastapi uvicorn &&
      uvicorn src.backend.demo_supabase_api:app --host 0.0.0.0 --port 54321"
    ports:
      - "54321:54321"
    volumes:
      - .:/app:ro

  backend:
    image: python:3.12-slim
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      uvicorn src.backend.pdf_brief_api:app --host 0.0.0.0 --port 8000"
    depends_on:
      - supabase-local
    environment:
      BE_SURE_ANCE_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      BROCHURE_STORAGE_BUCKET: local-demo-no-bucket
      SUPABASE_SECRET_KEY: sb_secret_local_demo_not_real
      SUPABASE_URL: http://supabase-local:54321
    ports:
      - "8000:8000"
    volumes:
      - .:/app:ro

  frontend:
    image: node:20-alpine
    working_dir: /app/src/be-sure-ance-app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
      - supabase-local
    environment:
      VITE_PDF_BRIEF_ENDPOINT: http://localhost:8000/briefs/client.pdf
      VITE_SHARE_ENDPOINT: http://localhost:8000/shares
      VITE_SITE_ORIGIN: http://localhost:5173
      VITE_SUPABASE_ANON_KEY: local-demo-anon-key
      VITE_SUPABASE_URL: http://localhost:54321
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - frontend_node_modules:/app/src/be-sure-ance-app/node_modules

  scraper:
    image: python:3.12-slim
    profiles:
      - tools
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      python -m src.scrapers.moh_institutions --dry-run"
    environment:
      BROCHURE_STORAGE_BUCKET: local-demo-no-bucket
      SUPABASE_SECRET_KEY: sb_secret_local_demo_not_real
      SUPABASE_URL: http://supabase-local:54321
    volumes:
      - .:/app:ro

  bot:
    image: python:3.12-slim
    profiles:
      - bot
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      python -m src.bot.telegram_bot"
    depends_on:
      - supabase-local
    environment:
      SUPABASE_SECRET_KEY: sb_secret_local_demo_not_real
      SUPABASE_URL: http://supabase-local:54321
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    volumes:
      - .:/app:ro

volumes:
  frontend_node_modules:
