name: publish-open-dataset

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * 0"

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install browser for live scrapers
        run: python3 -m playwright install chromium

      - name: Generate static app data
        run: python3 -m src.lib.static_app_data --run-scrapers --output src/be-sure-ance-app/public/data/app-data.json

      - name: Validate static app data
        run: python3 scripts/validate_static_app_data.py --path src/be-sure-ance-app/public/data/app-data.json

      - name: Export open dataset snapshot
        run: |
          snapshot_date="$(date -u +%F)"
          python3 -m src.lib.open_dataset \
            --date "$snapshot_date" \
            --output "data/be-sure-ance-snapshot-${snapshot_date}.csv"

      - name: Upload open dataset artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-dataset-snapshot
          path: data/be-sure-ance-snapshot-*.csv
          if-no-files-found: error
          retention-days: 90

      - name: Publish dataset summary
        run: |
          {
            echo "## Open dataset snapshot"
            echo
            echo "Artifact: \`open-dataset-snapshot\`"
            echo
            ls -lh data/be-sure-ance-snapshot-*.csv
          } >> "$GITHUB_STEP_SUMMARY"
