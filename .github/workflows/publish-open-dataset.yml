name: publish-open-dataset

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * 0"
  workflow_run:
    workflows: ["scrape-to-supabase"]
    types: [completed]

jobs:
  export:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Export open dataset snapshot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || vars.SUPABASE_ANON_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          snapshot_date="$(date -u +%F)"
          python -m src.lib.open_dataset \
            --date "$snapshot_date" \
            --output "data/be-sure-ance-snapshot-${snapshot_date}.csv"

      - name: Upload open dataset artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-dataset-snapshot
          path: data/be-sure-ance-snapshot-*.csv
          if-no-files-found: error
          retention-days: 90

      - name: Publish dataset summary
        run: |
          {
            echo "## Open dataset snapshot"
            echo
            echo "Artifact: \`open-dataset-snapshot\`"
            echo
            ls -lh data/be-sure-ance-snapshot-*.csv
          } >> "$GITHUB_STEP_SUMMARY"
