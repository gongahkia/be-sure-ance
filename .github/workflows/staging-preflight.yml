name: staging-preflight

on:
  workflow_dispatch:
    inputs:
      staging_origin:
        description: "Absolute staging origin, for example https://staging.example.com"
        required: false
        type: string

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    env:
      STAGING_ORIGIN: ${{ inputs.staging_origin || vars.STAGING_ORIGIN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Require staging origin
        run: test -n "$STAGING_ORIGIN"

      - name: Run smoke, security, and free-tier load checks
        run: |
          python3 scripts/staging_preflight.py \
            --origin "$STAGING_ORIGIN" \
            --output output/staging-preflight/preflight.json \
            --load-requests 24 \
            --load-concurrency 3 \
            --max-p95-ms 1500

      - name: Run Lighthouse gates
        run: |
          mkdir -p output/staging-preflight
          npx --yes lighthouse "$STAGING_ORIGIN/" \
            --quiet \
            --chrome-flags="--headless --no-sandbox" \
            --only-categories=performance,accessibility,best-practices,seo \
            --output=json \
            --output-path=output/staging-preflight/lighthouse-workspace.json
          npx --yes lighthouse "$STAGING_ORIGIN/matrix/panel-hospitals" \
            --quiet \
            --chrome-flags="--headless --no-sandbox" \
            --only-categories=performance,accessibility,best-practices,seo \
            --output=json \
            --output-path=output/staging-preflight/lighthouse-matrix.json
          npx --yes lighthouse "$STAGING_ORIGIN/status" \
            --quiet \
            --chrome-flags="--headless --no-sandbox" \
            --only-categories=performance,accessibility,best-practices,seo \
            --output=json \
            --output-path=output/staging-preflight/lighthouse-status.json
          npx --yes lighthouse "$STAGING_ORIGIN/share?plans=aia:healthshield-gold-max-demo" \
            --quiet \
            --chrome-flags="--headless --no-sandbox" \
            --only-categories=performance,accessibility,best-practices,seo \
            --output=json \
            --output-path=output/staging-preflight/lighthouse-share.json
          python3 scripts/lighthouse_score_gate.py output/staging-preflight/lighthouse-*.json --minimum 0.9

      - name: Upload staging preflight evidence
        uses: actions/upload-artifact@v4
        with:
          name: staging-preflight
          path: output/staging-preflight/*
          if-no-files-found: error
          retention-days: 30
