name: refresh-static-data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * 0"

jobs:
  refresh-static-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    concurrency:
      group: refresh-static-data
      cancel-in-progress: false
    env:
      APP_DATA_PATH: src/be-sure-ance-app/public/data/app-data.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install browser for live scrapers
        run: python3 -m playwright install chromium

      - name: Generate static app data
        run: python3 -m src.lib.static_app_data --run-scrapers --output "$APP_DATA_PATH"

      - name: Validate static app data
        run: python3 scripts/validate_static_app_data.py --path "$APP_DATA_PATH"

      - name: Commit static app data
        id: commit-data
        run: |
          if [ -z "$(git status --porcelain -- "$APP_DATA_PATH")" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$APP_DATA_PATH"
          git commit -m "chore(data): refresh static app data [skip ci]"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Netlify build hook
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          if [ -z "$NETLIFY_BUILD_HOOK_URL" ]; then
            echo "NETLIFY_BUILD_HOOK_URL is not configured; skipping refresh."
            exit 0
          fi
          curl -fsS -X POST -d '{}' "$NETLIFY_BUILD_HOOK_URL"
