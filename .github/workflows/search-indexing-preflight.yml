name: search-indexing-preflight

on:
  workflow_dispatch:
    inputs:
      live_origin:
        description: "Absolute production origin, for example https://be-sure-ance.example"
        required: false
        type: string

jobs:
  verify-indexing:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      LIVE_ORIGIN: ${{ inputs.live_origin || vars.LIVE_ORIGIN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Require production origin
        run: test -n "$LIVE_ORIGIN"

      - name: Verify sitemap, robots, canonical metadata, and JSON-LD
        run: |
          python scripts/search_indexing_preflight.py \
            --origin "$LIVE_ORIGIN" \
            --output output/search-indexing/preflight.json

      - name: Upload search indexing evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: search-indexing-preflight
          path: output/search-indexing/preflight.json
          if-no-files-found: error
          retention-days: 30
