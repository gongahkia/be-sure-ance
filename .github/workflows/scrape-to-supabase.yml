name: scrape-to-supabase

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * 0"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium

      - name: Run full scraper set
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BROCHURE_STORAGE_BUCKET: ${{ vars.BROCHURE_STORAGE_BUCKET }}
        run: python -m src.scrapers.run_all

      - name: Parse brochure qualitative facts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BROCHURE_STORAGE_BUCKET: ${{ vars.BROCHURE_STORAGE_BUCKET }}
        run: python -m src.scrapers.brochure_facts

      - name: Discover panel and specialist resources
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BROCHURE_STORAGE_BUCKET: ${{ vars.BROCHURE_STORAGE_BUCKET }}
        run: python -m src.scrapers.panel_resources

      - name: Build comparison facts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BROCHURE_STORAGE_BUCKET: ${{ vars.BROCHURE_STORAGE_BUCKET }}
        run: python -m src.scrapers.comparison_facts
