name: Weekly scraper health review
description: Review scraper freshness, validation, artifacts, backups, and public status.
title: "[Ops] Weekly scraper health review - YYYY-MM-DD"
labels: ["phase-5", "observability"]
body:
  - type: markdown
    attributes:
      value: |
        Use docs/OPERATIONS.md. Do not paste secrets, raw exception payloads, request headers, or private legal notes.
  - type: input
    id: review_date
    attributes:
      label: Review date
      placeholder: "YYYY-MM-DD"
    validations:
      required: true
  - type: checkboxes
    id: evidence
    attributes:
      label: Evidence checked
      options:
        - label: Public /status dashboard reviewed.
        - label: scrape-to-supabase run reviewed.
        - label: validate-scraper-snapshots artifact reviewed.
        - label: publish-open-dataset artifact reviewed.
        - label: nightly-supabase-backup artifact reviewed.
        - label: Sentry reviewed if DSNs are configured.
  - type: textarea
    id: findings
    attributes:
      label: Findings and follow-ups
      description: Link follow-up issues for stale, failing, unsupported, or validation-failed carriers.
    validations:
      required: true
