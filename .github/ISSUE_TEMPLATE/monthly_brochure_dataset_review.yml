name: Monthly brochure and dataset review
description: Review brochure alerts, open dataset summary, and caveats.
title: "[Ops] Monthly brochure and dataset review - YYYY-MM"
labels: ["phase-5", "compliance"]
body:
  - type: markdown
    attributes:
      value: |
        Use docs/OPERATIONS.md. Do not paste subscriber, client, agent, account, payment, health-profile, or private-source-owner data.
  - type: input
    id: review_month
    attributes:
      label: Review month
      placeholder: "YYYY-MM"
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: brochure_change_alerts pending/sent/suppressed rows reviewed.
        - label: Duplicate or disputed alerts suppressed.
        - label: Open dataset row count and source URL coverage reviewed.
        - label: Dataset caveats match README and docs/COMPLIANCE.md.
        - label: No PII or secret-like fields found in alert or dataset artifacts.
  - type: textarea
    id: summary
    attributes:
      label: Monthly summary
      description: Record counts, caveats, and follow-up issue links.
    validations:
      required: true
