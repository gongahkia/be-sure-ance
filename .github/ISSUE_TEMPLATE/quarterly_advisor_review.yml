name: Quarterly licensed-advisor review
description: Review qualitative entries with a licensed adviser or compliance-qualified reviewer.
title: "[Ops] Quarterly licensed-advisor review - YYYY-QN"
labels: ["phase-5", "compliance"]
body:
  - type: markdown
    attributes:
      value: |
        Use docs/OPERATIONS.md. Keep private legal, compliance, client, or adviser notes outside the repository.
  - type: input
    id: quarter
    attributes:
      label: Quarter
      placeholder: "YYYY-QN"
    validations:
      required: true
  - type: input
    id: reviewer_role
    attributes:
      label: Reviewer role
      placeholder: "Singapore-licensed adviser, compliance reviewer, etc."
    validations:
      required: true
  - type: checkboxes
    id: sample
    attributes:
      label: Minimum sample
      options:
        - label: At least 3 scheduled carriers reviewed.
        - label: At least 2 plans per sampled carrier reviewed where data exists.
        - label: Panel hospital facts reviewed.
        - label: Exclusions and waiting-period facts reviewed.
        - label: Claim-process facts reviewed.
        - label: Brochure metadata and source links reviewed.
        - label: MAS/LIA regulatory or canonicalization context reviewed where shown.
  - type: textarea
    id: public_actions
    attributes:
      label: Public action items
      description: Record non-private action items and follow-up issue links only.
    validations:
      required: true
